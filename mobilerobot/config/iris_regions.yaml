regions:
  - id: R1
    center: [0.0, 0.0]
  - id: R2
    center: [1.0, 0.0]
  - id: R3
    center: [2.0, 0.2]
  - id: R4
    center: [2.0, 1.0]

portals:
  - {from: R1, to: R2, point: [0.5, 0.0], bidirectional: true}
  - {from: R2, to: R3, point: [1.5, 0.1], bidirectional: true}
  - {from: R3, to: R4, point: [2.0, 0.6], bidirectional: true}